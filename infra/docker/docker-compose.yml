services:
  postgres:
    image: postgres:16-alpine
    container_name: swahit-db-local
    restart: always
    environment:
      POSTGRES_USER: swahit_user
      POSTGRES_PASSWORD: swahit_password
      POSTGRES_DB: swahit_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: swahit-redis-local
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
